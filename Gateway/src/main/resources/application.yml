spring:
  application:
    name: gateway

server:
  port: ${GATEWAY_PORT:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

warehouse:
  gateway:
    cors:
      allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
      allowed-methods: ${GATEWAY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${GATEWAY_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Correlation-ID,X-Requested-With}
      exposed-headers: ${GATEWAY_CORS_EXPOSED_HEADERS:X-Correlation-ID}
      max-age-seconds: ${GATEWAY_CORS_MAX_AGE_SECONDS:3600}
    routes:
      - id: manager-api
        path-prefix: manager
        uri: ${MANAGER_API_URL:http://localhost:8080/v2/api}
        health-path: ${MANAGER_API_HEALTH_PATH:/actuator/health}
      - id: software-configuration
        path-prefix: software-configuration
        uri: ${SOFTWARE_CONFIGURATION_URL:http://localhost:8081}
        health-path: ${SOFTWARE_CONFIGURATION_HEALTH_PATH:/actuator/health}
      - id: delivery-protection
        path-prefix: delivery-protection
        uri: ${DELIVERY_PROTECTION_URL:http://localhost:8060/v2/api}
        health-path: ${DELIVERY_PROTECTION_HEALTH_PATH:/actuator/health}
      - id: returning-track-manager
        path-prefix: returning-track-manager
        uri: ${RETURNING_TRACK_MANAGER_URL:http://localhost:8070/v2/api}
        health-path: ${RETURNING_TRACK_MANAGER_HEALTH_PATH:/actuator/health}
      - id: route-tracker-flow
        path-prefix: route-tracker-flow
        uri: ${ROUTE_TRACKER_FLOW_URL:http://localhost:8082/v2/api}
        health-path: ${ROUTE_TRACKER_FLOW_HEALTH_PATH:/actuator/health}
      - id: pallet-handling-manager
        path-prefix: pallet-handling-manager
        uri: ${PALLET_HANDLING_MANAGER_URL:http://localhost:8071}
        health-path: ${PALLET_HANDLING_MANAGER_HEALTH_PATH:/actuator/health}

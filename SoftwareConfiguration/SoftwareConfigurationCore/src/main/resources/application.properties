spring.application.name=software-configuration
server.port=8081

##### Service discovery
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

# MongoDB connection properties
spring.data.mongodb.uri=mongodb://localhost:27017/warehouse
logging.level.org.springframework.data.mongodb.core.MongoTemplate=TRACE

# Uncomment the following lines if you don't provide the URI and want to configure host, port, and database separately
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=your-database

# Additional MongoDB settings
# spring.data.mongodb.authentication-database=admin
# spring.data.mongodb.ssl=false
# spring.data.mongodb.uri=mongodb+srv://<username>:<password>@cluster.mongodb.net/<database>

# Pool properties
# spring.data.mongodb.connection-minimum-idle=10
# spring.data.mongodb.connection-pool-size=100

# Uncomment the following line to enable MongoDB auto-index creation (use carefully in production)
# spring.data.mongodb.auto-index-creation=true

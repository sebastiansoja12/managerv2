##### Local db
spring.datasource.url=jdbc:h2:mem:dev;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:/changelog/db.changelog-master.xml
spring.datasource.driver-class-name=org.h2.Driver
services.mock=true
allowed.supplier=dwvscq
refreshtoken.delete=0 0 * * * *
return.url=${RETURNING_SERVICE_URL}
return.endpoint=${RETURNING_SERVICE_ENDPOINT}

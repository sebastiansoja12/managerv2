##### Environment
logging.level.org.springframework.boot.context.config=DEBUG
spring.application.name=manager-application
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.profiles.include=mail
server.port=${PORT:8080}

##### Service discovery
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
eureka.instance.health-check-url-path=${server.servlet.contextPath}/actuator/health
eureka.instance.status-page-url-path=${server.servlet.contextPath}/actuator/info

##### Database configuration
spring.liquibase.change-log=classpath:/changelog/db.changelog-master.xml

##### Swagger
spring.mvc.pathmatch.matching-strategy= ANT_PATH_MATCHER

##### Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:manager-application}
manager.kafka.topics.shipment-return-created=${SHIPMENT_RETURN_CREATED_TOPIC:shipment.return.created}
manager.kafka.topics.shipment-read-model-sync=${SHIPMENT_READ_MODEL_SYNC_TOPIC:shipment.read-model.sync}
manager.kafka.consumer-groups.shipment-read-model-sync=${SHIPMENT_READ_MODEL_SYNC_GROUP_ID:manager-shipment-read-model}
manager.kafka.domain-events.enabled=${MANAGER_KAFKA_DOMAIN_EVENTS_ENABLED:true}

##### Global prefix endpoint
server.servlet.contextPath=/v2/api

##### API exposure
api.exposure.internal-prefix=/internal
api.exposure.internal-controller-paths[0]=/device-pairings
api.exposure.internal-controller-paths[1]=/device-pairing-verifications
api.exposure.internal-controller-paths[2]=/shipments/read-sync
api.exposure.pair-key-controller-paths[0]=/device-pairing-verifications
api.exposure.public-endpoints[0].method=POST
api.exposure.public-endpoints[0].path=/device-pairings

purge.cron.expression= @midnight

##### Browser authentication
jwt.issuer=${JWT_ISSUER:manager-v2}
jwt.audience=${JWT_AUDIENCE:manager-v2-gui}
auth.cookie.access-name=${AUTH_ACCESS_COOKIE_NAME:AUTH-TOKEN}
auth.cookie.refresh-name=${AUTH_REFRESH_COOKIE_NAME:REFRESH-TOKEN}
auth.cookie.access-path=${AUTH_ACCESS_COOKIE_PATH:/}
auth.cookie.refresh-path=${AUTH_REFRESH_COOKIE_PATH:/v2/api/auth}
auth.cookie.domain=${AUTH_COOKIE_DOMAIN:}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.cors.allowed-origins=${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:3000}
auth.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
auth.cors.allowed-headers=Content-Type,X-XSRF-TOKEN,X-Correlation-ID,X-Requested-With
auth.cors.exposed-headers=X-Correlation-ID
auth.cors.max-age-seconds=3600

##### Geocoding credential encryption
geocoding.encryption-key=${GEOCODING_ENCRYPTION_KEY:}
